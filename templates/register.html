{% extends "base.html" %}

{% block title %}Register | Simple & Secure{% endblock %}

{% block content %}
<div class="glass-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join us today! It only takes a minute.</p>

    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="johndoe123" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label>Mobile No.</label>
            <input type="tel" name="mobile_no" placeholder="+1 234 567 890" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('password')">Show</button>
            </div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('confirm_password')">Show</button>
            </div>
        </div>

        <button type="submit" class="submit-btn" style="background: var(--success);">Sign Up Now</button>
    </form>

    <div class="card-footer">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
</div>
{% endblock %}
