{% extends "base.html" %}

{% block title %}Login | Simple & Secure{% endblock %}

{% block content %}
<div class="glass-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details to login</p>

    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('password')">Show</button>
            </div>
        </div>

        <button type="submit" class="submit-btn">Login to Account</button>
    </form>

    <div class="card-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>
</div>
{% endblock %}
